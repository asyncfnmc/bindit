plugins { id 'net.fabricmc.fabric-loom' version '1.17-SNAPSHOT'; id 'maven-publish' }
version = project.mod_version
group = project.group
base { archivesName = project.archives_base_name }
repositories { mavenCentral(); maven { url = 'https://maven.terraformersmc.com/releases/' } }
dependencies {
 minecraft "com.mojang:minecraft:${project.minecraft_version}"
 implementation "net.fabricmc:fabric-loader:${project.loader_version}"
 implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
 compileOnly "com.terraformersmc:modmenu:${project.modmenu_version}"
}
loom { splitEnvironmentSourceSets(); mods { bindit { sourceSet sourceSets.main; sourceSet sourceSets.client } } }
processResources { inputs.property 'version', project.version; filesMatching('fabric.mod.json') { expand 'version': project.version } }
tasks.withType(JavaCompile).configureEach { it.options.release = 25 }
java { withSourcesJar(); sourceCompatibility = JavaVersion.VERSION_25; targetCompatibility = JavaVersion.VERSION_25 }
